name: Build and Publish Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "**"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

# needed to push images to GHCR and to create releases
permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - controlplane
          - identity-hub
          - issuerservice
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shadow jar and download OTel agent
        run: ./gradlew :${{ matrix.module }}:shadowJar downloadOtelAgent --no-daemon

      # The Dockerfile expects the OTel agent inside the module's build/otel dir,
      # but downloadOtelAgent places it in the root project build dir.
      - name: Stage OTel agent into module context
        run: |
          mkdir -p "${{ matrix.module }}/build/otel"
          cp build/otel/opentelemetry-javaagent.jar "${{ matrix.module }}/build/otel/opentelemetry-javaagent.jar"

      # Push on pushes to main and on tags; only build (no push) on other branches.
      - name: Determine whether to push
        id: push
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.push.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.module }}
          # - `latest` on main pushes and on tags
          # - the short commit hash on every push/tag
          # - the tag name when a tag is created
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
            type=sha,format=short,prefix=
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.module }}
          file: ${{ matrix.module }}/src/main/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.push.outputs.enabled == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JAR=build/libs/${{ matrix.module }}.jar
            OTEL_AGENT=build/otel/opentelemetry-javaagent.jar

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
